        <!-- page-specific styles: make navbar transparent and position particles behind content -->
        <style>
            /* Full-screen particles canvas sits behind all content */
            #particles-js {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: -1; /* behind page content */
                background-color: #000; /* fallback if particles fail to load */
            }

            /* Make the Bootstrap navbar fixed and transparent so particles show through */
            :root { --navbar-height: 64px; }
            .navbar {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: var(--navbar-height);
                display: flex;
                align-items: center;
                background: transparent !important; /* transparent to show particles */
                backdrop-filter: none;
                -webkit-backdrop-filter: none;
                border-bottom: none;
                z-index: 9999;
            }

            /* Ensure collapsed menu (on mobile) remains transparent */
            .navbar .navbar-collapse,
            .navbar .navbar-nav,
            .navbar .navbar-nav .nav-link {
                background-color: transparent !important;
            }

            /* push page content below the fixed navbar */
            body {
                padding-top: calc(var(--navbar-height) + 8px);
            }

            /* Navbar content color and toggler visibility */
            .navbar .navbar-brand,
            .navbar .nav-link {
                color: #fff !important;
                font-weight: 500;
            }

            .navbar .nav-link:hover {
                color: #dcdcdc !important;
            }

            .navbar .nav-link.active {
                color: #ffffff !important;
                text-decoration: underline;
                text-underline-offset: 4px;
                opacity: 0.95;
            }

            .navbar-toggler-icon {
                filter: invert(1) brightness(1.2);
            }

            /* Social icons: consistent, subtle, and accessible */
            .interactive.social-links {
                display: flex;
                gap: 10px;
                align-items: center;
                justify-content: center;
            }

            .interactive.social-links img,
            .interactive.social-links svg {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                padding: 6px;
                background: rgba(255,255,255,0.03);
                border: 1px solid rgba(255,255,255,0.08);
                box-shadow: 0 2px 6px rgba(0,0,0,0.35);
                transition: transform .12s ease, filter .12s ease, box-shadow .12s ease;
                filter: grayscale(100%) brightness(1.0);
                display: inline-block;
            }

            .interactive.social-links a:focus {
                outline: 2px solid rgba(255,255,255,0.12);
                outline-offset: 3px;
                border-radius: 6px;
            }

            .interactive.social-links a:hover img,
            .interactive.social-links a:hover svg {
                transform: translateY(-3px) scale(1.05);
                filter: none;
                box-shadow: 0 6px 14px rgba(0,0,0,0.45);
            }

            /* If using a fixed navbar in the future, ensure content isn't hidden */
        </style>

                            "move": {"enable": true, "speed": 2, "direction": "none", "out_mode": "out"}
                        },
                        "interactivity": {
                            "detect_on": "canvas",
                            "events": {
                                "onhover": {"enable": true, "mode": "grab"},
                                "onclick": {"enable": true, "mode": "push"},
                                "resize": true
                            },
                            "modes": {"grab": {"distance": 140, "line_linked": {"opacity": 0.5}}, "push": {"particles_nb": 4}}
                        },
                        "retina_detect": true
                    });
                }
            });
        </script>

        <!-- real-time spotify -->

        <script>
            function updateSong(){
                getSong(function(artist, title, nowplaying, lastfm_url) {
                    if (nowplaying === "true") {
			    $("#live-dot").fadeIn(500); // Fade in with 500ms duration
			    $("#live-message").text("Currently playing:").fadeIn(500); // Fade in with 500ms duration
			} else {
			    $("#live-dot").fadeOut(500); // Fade out with 500ms duration
			    $("#live-message").html("Was listening to:").fadeIn(500); // Fade in with 500ms duration
			}

                    if (artist.length > 25) {
                        if (artist[22] == " ") {
                            artist = artist.substring(0,21) + "..."
                        }
                        else {
                            artist = artist.substring(0,22) + "...";
                        }
                    };

                    if (title.length > 25) {
                        if (title[22] == " ") {
                            title = title.substring(0,21) + "..."
                        } else {
                            title = title.substring(0,22) + "...";
                        }
                    };

                    $("#artist").text(artist);
                    $("#song").text(title);
                    // if lastfm gives back a javascript: url its over..
                    $("#lastfm-url").attr("href", lastfm_url);
                }, "solo68");
            }
            
            updateSong();
            setInterval(function(){
                updateSong();
            }, 4000);
        </script>
